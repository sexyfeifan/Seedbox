openapi: 3.0.3
info:
  title: Seedbox API
  version: 1.0.0
  description: Initial API contract for cross-platform read-it-later app.
servers:
  - url: https://api.seedbox.local
security:
  - bearerAuth: []
paths:
  /v1/auth/request-code:
    post:
      summary: Request email verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthRequestCodeRequest' }
      responses:
        '200':
          description: Code generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthRequestCodeResponse' }

  /v1/auth/verify-code:
    post:
      summary: Verify code and issue access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthVerifyCodeRequest' }
      responses:
        '200':
          description: Verification success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenWithUser' }

  /v1/auth/refresh:
    post:
      summary: Refresh access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthRefreshRequest' }
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenPair' }
        '401':
          description: Invalid refresh token

  /v1/auth/whoami:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized

  /v1/billing/plans:
    get:
      summary: List available subscription plans
      security: []
      responses:
        '200':
          description: Plan list
          content:
            application/json:
              schema:
                type: object
                required: [plans]
                properties:
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingPlan'

  /v1/billing/subscription:
    get:
      summary: Get current user's subscription and entitlements
      responses:
        '200':
          description: Subscription state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingState'
        '401':
          description: Unauthorized

  /v1/billing/subscribe:
    post:
      summary: Subscribe to a paid plan (mock flow for MVP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSubscribeRequest'
      responses:
        '201':
          description: Subscription activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingState'
        '401':
          description: Unauthorized

  /v1/billing/cancel:
    post:
      summary: Cancel current paid subscription
      responses:
        '200':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingState'
        '401':
          description: Unauthorized

  /v1/captures:
    post:
      summary: Capture a URL from share action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '202':
          description: Accepted for parsing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureResponse'
        '401':
          description: Unauthorized

  /v1/collections:
    get:
      summary: List collections
      responses:
        '200':
          description: Collection list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized
    post:
      summary: Create collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized

  /v1/collections/{collectionId}:
    patch:
      summary: Update collection
      parameters:
        - in: path
          name: collectionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Delete collection
      parameters:
        - in: path
          name: collectionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /v1/items:
    get:
      summary: List items
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, parsing, ready, failed]
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: collectionId
          schema:
            type: string
            format: uuid
        - in: query
          name: archived
          schema:
            type: boolean
      responses:
        '200':
          description: Item list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItems'

  /v1/items/{itemId}:
    get:
      summary: Get item detail
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetail'
    patch:
      summary: Update item metadata
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSummary'
        '401':
          description: Unauthorized
    delete:
      summary: Archive an item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Archived
        '401':
          description: Unauthorized

  /v1/items/{itemId}/permanent:
    delete:
      summary: Permanently delete an item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Permanently deleted
        '401':
          description: Unauthorized

  /v1/items/purge-archived:
    post:
      summary: Permanently delete all archived items for current user
      responses:
        '200':
          description: Purge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
        '401':
          description: Unauthorized

  /v1/items/{itemId}/highlights:
    post:
      summary: Create highlight
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHighlightRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Highlight'
    get:
      summary: List highlights by item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Highlight list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Highlight'

  /v1/items/{itemId}/highlights/{highlightId}:
    delete:
      summary: Delete highlight
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: highlightId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized

  /v1/items/{itemId}/notes:
    post:
      summary: Create note
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
    get:
      summary: List notes by item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Note list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'

  /v1/items/{itemId}/notes/{noteId}:
    patch:
      summary: Update note
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: noteId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
    delete:
      summary: Delete note
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: noteId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized

  /v1/items/{itemId}/summary:
    post:
      summary: Trigger AI summary generation
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
      responses:
        '200':
          description: Existing ready summary returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSummarySnapshot'
        '202':
          description: Summary job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSummarySnapshot'
    get:
      summary: Get item summary status/result
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Summary state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSummarySnapshot'

  /v1/search:
    get:
      summary: Full-text search over user items
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemSummary'

  /v1/sync/pull:
    post:
      summary: Pull incremental changes since event id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sinceEventId]
              properties:
                sinceEventId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: Sync events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPullResponse'

  /v1/sync/push:
    post:
      summary: Push offline operations from client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operations]
              properties:
                operations:
                  type: array
                  items:
                    $ref: '#/components/schemas/ClientOperation'
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  rejected:
                    type: integer
                  lastEventId:
                    type: integer
                    format: int64

  /v1/health:
    get:
      summary: Service health check
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, timestamp]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /v1/health/errors:
    get:
      summary: Internal error aggregation snapshot
      security: []
      parameters:
        - in: header
          name: x-internal-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Error counters and recent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorStats'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string

    AuthRequestCodeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string

    AuthRequestCodeResponse:
      type: object
      required: [ok, expiresInMs]
      properties:
        ok:
          type: boolean
        expiresInMs:
          type: integer
        devCode:
          type: string
          description: Present in non-production when dev code exposure is enabled

    AuthVerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^\d{6}$'
        displayName:
          type: string

    AuthRefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthTokenPair:
      type: object
      required: [accessToken, refreshToken, tokenType, accessExpiresIn, refreshExpiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        accessExpiresIn:
          type: integer
        refreshExpiresIn:
          type: integer

    AuthTokenWithUser:
      allOf:
        - $ref: '#/components/schemas/AuthTokenPair'
        - type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/UserProfile'

    BillingPlan:
      type: object
      required: [id, title, priceCnyMonthly, features]
      properties:
        id:
          type: string
          enum: [free, pro_monthly]
        title:
          type: string
        priceCnyMonthly:
          type: integer
        features:
          type: array
          items:
            type: string

    BillingSubscription:
      type: object
      required: [userId, plan, status, provider, startedAt, updatedAt]
      properties:
        userId:
          type: string
          format: uuid
        plan:
          type: string
          enum: [free, pro_monthly]
        status:
          type: string
          enum: [active, canceled]
        provider:
          type: string
        startedAt:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        canceledAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BillingEntitlements:
      type: object
      required: [isPro, canUsePrioritySummary, unlimitedCollections]
      properties:
        isPro:
          type: boolean
        canUsePrioritySummary:
          type: boolean
        unlimitedCollections:
          type: boolean

    BillingState:
      type: object
      required: [subscription, entitlements]
      properties:
        subscription:
          $ref: '#/components/schemas/BillingSubscription'
        entitlements:
          $ref: '#/components/schemas/BillingEntitlements'

    BillingSubscribeRequest:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [pro_monthly]
        provider:
          type: string

    CaptureRequest:
      type: object
      required: [sourceUrl]
      properties:
        sourceUrl:
          type: string
          description: >
            支持纯 http/https 链接，或包含链接的整段分享文案（服务端会自动提取首个有效链接）。
        titleHint:
          type: string
        sourceApp:
          type: string
        collectionId:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string

    CaptureResponse:
      type: object
      required: [itemId, status]
      properties:
        itemId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, parsing, ready, failed]

    Collection:
      type: object
      required: [id, name, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
        name:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parentId:
          type: string
          format: uuid
        sortOrder:
          type: integer

    UpdateCollectionRequest:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer

    ItemSummary:
      type: object
      required: [id, sourceUrl, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        collectionId:
          type: string
          format: uuid
        sourceUrl:
          type: string
          format: uri
        canonicalUrl:
          type: string
          format: uri
        domain:
          type: string
        title:
          type: string
        coverImageUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [queued, parsing, ready, failed]
        tags:
          type: array
          items:
            type: string
        archivedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ItemDetail:
      allOf:
        - $ref: '#/components/schemas/ItemSummary'
        - type: object
          properties:
            htmlContent:
              type: string
            markdownContent:
              type: string
            plainText:
              type: string
            summaryStatus:
              type: string
              enum: [idle, queued, running, ready, failed]
            summaryText:
              type: string
            summaryKeyPoints:
              type: array
              items:
                type: string
            summaryUpdatedAt:
              type: string
              format: date-time
            summaryError:
              type: string
            summaryProvider:
              type: string
            summaryModel:
              type: string
            wordCount:
              type: integer
            readingMinutes:
              type: integer
            assets:
              type: array
              items:
                $ref: '#/components/schemas/ItemAsset'
            parsedAt:
              type: string
              format: date-time
            highlights:
              type: array
              items:
                $ref: '#/components/schemas/Highlight'

    ItemAsset:
      type: object
      required: [id, type, url, sortOrder, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [image, video, file]
        url:
          type: string
          format: uri
        width:
          type: integer
        height:
          type: integer
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        previewUrl:
          type: string
        downloadUrl:
          type: string

    UpdateItemRequest:
      type: object
      properties:
        title:
          type: string
        collectionId:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
        isFavorite:
          type: boolean
        archived:
          type: boolean

    CreateHighlightRequest:
      type: object
      required: [quote]
      properties:
        quote:
          type: string
        startOffset:
          type: integer
        endOffset:
          type: integer
        color:
          type: string
          default: yellow
        note:
          type: string

    Highlight:
      type: object
      required: [id, itemId, quote, color, createdAt]
      properties:
        id:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
        quote:
          type: string
        startOffset:
          type: integer
        endOffset:
          type: integer
        color:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateNoteRequest:
      type: object
      required: [bodyMd]
      properties:
        title:
          type: string
        bodyMd:
          type: string

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
        bodyMd:
          type: string

    Note:
      type: object
      required: [id, itemId, bodyMd, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
        title:
          type: string
        bodyMd:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ItemSummarySnapshot:
      type: object
      required: [itemId, status, keyPoints]
      properties:
        itemId:
          type: string
          format: uuid
        status:
          type: string
          enum: [idle, queued, running, ready, failed]
        summaryText:
          type: string
        keyPoints:
          type: array
          items:
            type: string
        error:
          type: string
        provider:
          type: string
        model:
          type: string
        updatedAt:
          type: string
          format: date-time

    PaginatedItems:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemSummary'
        nextCursor:
          type: string

    SyncEvent:
      type: object
      required: [id, entityType, entityId, action, createdAt]
      properties:
        id:
          type: integer
          format: int64
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
        action:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    SyncPullResponse:
      type: object
      required: [events, lastEventId]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/SyncEvent'
        lastEventId:
          type: integer
          format: int64

    ClientOperation:
      type: object
      required: [opId, entityType, action, payload]
      properties:
        opId:
          type: string
        entityType:
          type: string
        action:
          type: string
        payload:
          type: object
          additionalProperties: true

    ErrorStats:
      type: object
      required: [total, byPhase, recent]
      properties:
        total:
          type: integer
        byPhase:
          type: object
          required: [request, startup, process]
          properties:
            request:
              type: integer
            startup:
              type: integer
            process:
              type: integer
        recent:
          type: array
          items:
            $ref: '#/components/schemas/ErrorEvent'

    ErrorEvent:
      type: object
      required: [at, message, name, phase]
      properties:
        at:
          type: string
          format: date-time
        message:
          type: string
        name:
          type: string
        phase:
          type: string
          enum: [request, startup, process]
        statusCode:
          type: integer
        reqId:
          type: string
        method:
          type: string
        url:
          type: string
