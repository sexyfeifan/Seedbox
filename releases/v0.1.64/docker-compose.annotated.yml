# `services`：定义要启动的容器服务列表
services:
  # `seedbox-backend`：主服务，负责 Web 页面、API、收藏存储、媒体文件代理
  seedbox-backend:
    # `image`：后端镜像地址与版本号，这里固定到 v0.1.64
    image: sexyfeifan/seedbox-backend:v0.1.64
    # `container_name`：容器名称，便于你在 Docker 里识别和管理
    container_name: seedbox-backend
    # `restart`：异常退出或开机后自动拉起容器
    restart: unless-stopped
    # `environment`：后端运行时环境变量
    environment:
      # `TZ`：容器内时区，影响日志时间与部分站点时间解析
      TZ: Asia/Shanghai
      # `NODE_ENV`：Node.js 运行环境，生产环境固定为 production
      NODE_ENV: production
      # `HOST`：服务监听地址，0.0.0.0 表示容器内所有网卡都监听
      HOST: 0.0.0.0
      # `PORT`：后端容器内部监听端口
      PORT: 12333
      # `STORE_DRIVER`：存储驱动，当前使用 memory 表示内存存储 + 文件持久化
      STORE_DRIVER: memory
      # `MEMORY_STORE_PERSIST_PATH`：收藏持久化文件路径，容器删除后能否保留数据主要看这里是否挂载到宿主机
      MEMORY_STORE_PERSIST_PATH: /data/memory-store.json
      # `MEMORY_STORE_PERSIST_DEBOUNCE_MS`：数据写盘防抖时间，单位毫秒，避免每次改动都立刻刷盘
      MEMORY_STORE_PERSIST_DEBOUNCE_MS: 800
      # `INTERNAL_API_TOKEN`：后端与 parser worker 之间的内部通信令牌，两边必须一致
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-seedbox-dev-token}
      # `CLIENT_ACCESS_TOKEN`：Web/API 对外访问令牌，留空表示不启用额外访问口令
      CLIENT_ACCESS_TOKEN: ${CLIENT_ACCESS_TOKEN:-}
      # `COMMERCIAL_MODE_ENABLED`：是否启用商业化登录/订阅相关界面，当前默认关闭
      COMMERCIAL_MODE_ENABLED: ${COMMERCIAL_MODE_ENABLED:-false}
      # `SEEDBOX_RELEASE_VERSION`：整体服务端发布版本号，用于页面与诊断展示
      SEEDBOX_RELEASE_VERSION: ${SEEDBOX_RELEASE_VERSION:-v0.1.64}
      # `SEEDBOX_BACKEND_VERSION`：后端版本号，按规则与 parser 保持一致
      SEEDBOX_BACKEND_VERSION: ${SEEDBOX_BACKEND_VERSION:-v0.1.64}
      # `SEEDBOX_PARSER_VERSION`：解析器版本号，按规则与 backend 保持一致
      SEEDBOX_PARSER_VERSION: ${SEEDBOX_PARSER_VERSION:-v0.1.64}
      # `CAPTURE_RESOLVE_TIMEOUT_MS`：分享链接解析超时时间，单位毫秒
      CAPTURE_RESOLVE_TIMEOUT_MS: ${CAPTURE_RESOLVE_TIMEOUT_MS:-12000}
      # `ASSET_FETCH_TIMEOUT_MS`：图片/视频代理抓取超时时间，单位毫秒
      ASSET_FETCH_TIMEOUT_MS: ${ASSET_FETCH_TIMEOUT_MS:-30000}
      # `EXTRA_NOISE_ASSET_PATTERNS`：额外噪音图片规则，留空表示不追加自定义过滤
      EXTRA_NOISE_ASSET_PATTERNS: ${EXTRA_NOISE_ASSET_PATTERNS:-}
    # `ports`：把宿主机端口映射到容器端口
    ports:
      # `SEEDBOX_HOST_PORT`：你在浏览器访问的端口，默认宿主机 12333 -> 容器 12333
      - "${SEEDBOX_HOST_PORT:-12333}:12333"
    # `volumes`：目录挂载配置
    volumes:
      # `./data/backend:/data`：把当前 compose 目录下的 `data/backend` 挂到容器 `/data`，这里就是收藏持久化保存位置
      - ./data/backend:/data
    # `healthcheck`：容器健康检查配置，Docker 会据此判断服务是否正常
    healthcheck:
      # `test`：通过请求健康检查接口判断后端是否可用
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:12333/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      # `interval`：每 10 秒检查一次
      interval: 10s
      # `timeout`：单次检查超时时间 3 秒
      timeout: 3s
      # `retries`：连续失败 10 次后判定为 unhealthy
      retries: 10

  # `seedbox-parser-worker`：解析服务，负责抓网页、提正文、提图片、提视频
  seedbox-parser-worker:
    # `image`：parser worker 镜像地址与版本号，这里固定到 v0.1.64
    image: sexyfeifan/seedbox-parser-worker:v0.1.64
    # `container_name`：解析器容器名称
    container_name: seedbox-parser-worker
    # `restart`：异常退出或开机后自动拉起解析器容器
    restart: unless-stopped
    # `depends_on`：声明 parser 依赖 backend 先启动
    depends_on:
      # `seedbox-backend`：parser 启动时依赖后端服务存在
      - seedbox-backend
    # `environment`：解析器运行时环境变量
    environment:
      # `TZ`：解析器容器时区
      TZ: Asia/Shanghai
      # `NODE_ENV`：解析器运行环境
      NODE_ENV: production
      # `WORKER_MODE`：工作模式，api 表示从 backend 拉取待解析任务
      WORKER_MODE: api
      # `API_BASE_URL`：后端 API 地址，容器间通过服务名互相访问
      API_BASE_URL: http://seedbox-backend:12333
      # `INTERNAL_API_TOKEN`：与 backend 通信的内部令牌，必须与 backend 配置一致
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-seedbox-dev-token}
      # `SEEDBOX_PARSER_VERSION`：解析器版本号，和 backend 保持一致
      SEEDBOX_PARSER_VERSION: ${SEEDBOX_PARSER_VERSION:-v0.1.64}
      # `WORKER_POLL_INTERVAL_MS`：轮询后端待解析任务的间隔，单位毫秒
      WORKER_POLL_INTERVAL_MS: 3000
      # `ENABLE_PLAYWRIGHT_FALLBACK`：启用 Playwright 动态回退抓取，建议保持 true
      ENABLE_PLAYWRIGHT_FALLBACK: "true"
      # `DOUBAN_MIN_REQUEST_INTERVAL_MS`：豆瓣最小请求间隔，降低触发风控概率
      DOUBAN_MIN_REQUEST_INTERVAL_MS: ${DOUBAN_MIN_REQUEST_INTERVAL_MS:-4000}
      # `DOUBAN_REQUEST_JITTER_MS`：豆瓣请求随机抖动，进一步降低请求节奏过于固定的问题
      DOUBAN_REQUEST_JITTER_MS: ${DOUBAN_REQUEST_JITTER_MS:-1200}
      # `DOUBAN_COOKIE`：可选豆瓣 Cookie，遇到限制时可填写自己的浏览器 Cookie 提高成功率
      DOUBAN_COOKIE: ${DOUBAN_COOKIE:-}
    # `extra_hosts`：给容器增加额外 hosts 映射
    extra_hosts:
      # `host.docker.internal:host-gateway`：让容器能访问宿主机服务，某些本地联调场景会用到
      - "host.docker.internal:host-gateway"
