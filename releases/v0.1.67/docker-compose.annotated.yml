# Seedbox v0.1.67 服务端部署示例（逐项中文注释版）
services:
  # 后端 API 服务：负责收藏写入、列表读取、详情接口、媒体代理、Web 页面等
  seedbox-backend:
    # 后端镜像版本，建议与 parser-worker 保持一致
    image: sexyfeifan/seedbox-backend:v0.1.67
    # 容器名称，方便在宿主机上排查日志
    container_name: seedbox-backend
    # 容器异常退出后自动重启，除非手动停止
    restart: unless-stopped
    environment:
      # 容器时区，影响日志时间与部分时间展示
      TZ: Asia/Shanghai
      # Node 运行环境，生产环境固定为 production
      NODE_ENV: production
      # 服务监听地址，0.0.0.0 表示容器内所有网卡都监听
      HOST: 0.0.0.0
      # 容器内服务端口
      PORT: 12333
      # 存储驱动：当前默认使用内存存储 + 文件持久化
      STORE_DRIVER: memory
      # 内存存储持久化文件路径，建议映射到卷里长期保存
      MEMORY_STORE_PERSIST_PATH: /data/memory-store.json
      # 内存存储写盘防抖时间（毫秒），越小落盘越及时
      MEMORY_STORE_PERSIST_DEBOUNCE_MS: 800
      # 媒体缓存目录；图片/视频缓存将落到挂载的数据目录中
      ASSET_CACHE_DIR: /data/asset_cache
      # 站点图标缓存目录；网站 favicon 等图标会落到挂载的数据目录中
      SITE_ICON_CACHE_DIR: /data/site_icon_cache
      # 后端与 parser-worker 的内部通信令牌，两个服务必须一致
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-seedbox-dev-token}
      # 客户端访问令牌；如需公网访问控制，可设置一个非空值
      CLIENT_ACCESS_TOKEN: ${CLIENT_ACCESS_TOKEN:-}
      # 商业模式开关；普通自用可保持 false
      COMMERCIAL_MODE_ENABLED: ${COMMERCIAL_MODE_ENABLED:-false}
      # 当前统一发布版本号，仅作版本标识展示
      SEEDBOX_RELEASE_VERSION: ${SEEDBOX_RELEASE_VERSION:-v0.1.67}
      # 后端版本号，建议与 release 版本保持一致
      SEEDBOX_BACKEND_VERSION: ${SEEDBOX_BACKEND_VERSION:-v0.1.67}
      # 解析器版本号，建议与 release 版本保持一致
      SEEDBOX_PARSER_VERSION: ${SEEDBOX_PARSER_VERSION:-v0.1.67}
      # 捕获入口解析分享链接的超时时间（毫秒）
      CAPTURE_RESOLVE_TIMEOUT_MS: ${CAPTURE_RESOLVE_TIMEOUT_MS:-12000}
      # 后端回源抓媒体资源的超时时间（毫秒）
      ASSET_FETCH_TIMEOUT_MS: ${ASSET_FETCH_TIMEOUT_MS:-30000}
      # 额外噪音媒体过滤规则，留空即可
      EXTRA_NOISE_ASSET_PATTERNS: ${EXTRA_NOISE_ASSET_PATTERNS:-}
    ports:
      # 宿主机端口映射到容器 12333；默认外部访问端口也是 12333
      - "${SEEDBOX_HOST_PORT:-12333}:12333"
    volumes:
      # 持久化后端数据目录；默认使用 compose 同目录下的 data/backend
      - ./data/backend:/data
    healthcheck:
      # 健康检查：访问 /v1/health 判断后端是否正常
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:12333/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      # 每 10 秒检查一次
      interval: 10s
      # 单次检查超时 3 秒
      timeout: 3s
      # 连续失败 10 次后判定为 unhealthy
      retries: 10

  # 解析 worker：负责轮询待解析任务并抓取正文/图片/视频
  seedbox-parser-worker:
    # 解析器镜像版本，必须与后端版本配套
    image: sexyfeifan/seedbox-parser-worker:v0.1.67
    # 容器名称，方便查看日志
    container_name: seedbox-parser-worker
    # 容器异常退出后自动重启
    restart: unless-stopped
    depends_on:
      # 先等后端容器启动，再启动解析器
      - seedbox-backend
    environment:
      # 容器时区
      TZ: Asia/Shanghai
      # Node 运行环境
      NODE_ENV: production
      # worker 工作模式：api 表示通过内部 API 与后端通信
      WORKER_MODE: api
      # 后端内部访问地址，使用 docker service 名直连
      API_BASE_URL: http://seedbox-backend:12333
      # 与后端一致的内部通信令牌
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-seedbox-dev-token}
      # parser 自身版本标识
      SEEDBOX_PARSER_VERSION: ${SEEDBOX_PARSER_VERSION:-v0.1.67}
      # 轮询待解析任务的间隔（毫秒）
      WORKER_POLL_INTERVAL_MS: 3000
      # 是否开启 Playwright 动态回退；建议保持 true
      ENABLE_PLAYWRIGHT_FALLBACK: "true"
      # 豆瓣最小请求间隔（毫秒），用于降低触发风控概率
      DOUBAN_MIN_REQUEST_INTERVAL_MS: ${DOUBAN_MIN_REQUEST_INTERVAL_MS:-4000}
      # 豆瓣请求随机抖动（毫秒），用于进一步打散请求节奏
      DOUBAN_REQUEST_JITTER_MS: ${DOUBAN_REQUEST_JITTER_MS:-1200}
      # 豆瓣 Cookie；如需提高豆瓣抓取稳定性可自行填写
      DOUBAN_COOKIE: ${DOUBAN_COOKIE:-}
    extra_hosts:
      # 允许容器内通过 host.docker.internal 访问宿主机
      - "host.docker.internal:host-gateway"
